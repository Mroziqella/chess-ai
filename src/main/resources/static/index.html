<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szachy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Szachy</h1>

        <div id="lobby" class="lobby hidden">
            <div id="lobbyIdle" class="lobby-card">
                <p>Znajdź przeciwnika i zagraj!</p>
                <button onclick="findGame()">Szukaj gry</button>
            </div>
            <div id="lobbyWaiting" class="lobby-card hidden">
                <div class="spinner"></div>
                <p>Szukam przeciwnika...</p>
                <button onclick="cancelSearch()">Anuluj</button>
            </div>
            <form action="/api/logout" method="POST">
                <button type="submit">Wyloguj</button>
            </form>
        </div>

        <div id="gameView" class="game-view hidden">
            <div id="playerInfo" class="player-info hidden">
                <span>Przeciwnik: <strong id="opponentName"></strong></span>
                <span class="separator">|</span>
                <span>Grasz: <strong id="playerColorText"></strong></span>
            </div>

            <div id="statusBar" class="status-bar">
                <div id="playerDot" class="player-dot white"></div>
                <span id="status">Ruch: Białe</span>
            </div>

            <div class="board-wrapper">
                <div id="board" class="board"></div>
            </div>

            <div id="directControls" class="controls hidden">
                <button id="resetBtn" onclick="resetGame()">Nowa gra</button>
                <form action="/api/logout" method="POST" style="display:inline">
                    <button type="submit">Wyloguj</button>
                </form>
            </div>

            <div id="matchControls" class="controls hidden">
                <button id="newGameBtn" class="hidden" onclick="leaveAndFindNew()">Szukaj nowej gry</button>
                <form action="/api/logout" method="POST" style="display:inline">
                    <button type="submit">Wyloguj</button>
                </form>
            </div>
        </div>
    </div>

    <div id="promotionModal" class="modal-overlay">
        <div class="promotion-modal">
            <h3>Wybierz figurę</h3>
            <div id="promotionPieces" class="promotion-pieces"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
